version: '3.8'

services:
  redis:
    image: redis:latest
    container_name: redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - ./redis-data:/data
    restart: always
    networks:
      - redis-network

  redis-commander: 
    depends_on:
      - redis
    image: rediscommander/redis-commander:latest
    container_name: redis-commander
    environment:
        - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    restart: always
    networks:
      - redis-network

networks:
  redis-network:
    driver: bridge
      